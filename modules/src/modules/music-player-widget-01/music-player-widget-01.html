<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="music-player-widget-01.css"> 
    <title>Music Player Widget</title>
</head>
<body>
    <article class="music-player-widget">
        <div class="card">
            <img src="" alt="" class="my-image">
        </div>
        <div class="widget-song-data">
            <div class="my-song-title">
                <div>
                    <h1>Lo que nos representa</h1>
                    <span>Nuestra Provincia</span>
                </div>
                <img src="" alt="">
            </div>
            <div class="song-progress">
                <input type="range" name="" id="">
                <div class="minutes">
                    <time datetime="">1:23</time>
                    <time datetime="">3:47</time>
                </div>
            </div>
        </div>
    </article>
</body>
</html>
