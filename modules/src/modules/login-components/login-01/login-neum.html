<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./login-neum.css">
        <title>Shadow Login</title>
    </head>
    <body>
        <section class="main-container">
            <h1>Create an account</h1>
            <p>Already have an account? <a href="#">Log in</a></p>
            <form class="my-form">
                <div class="my-input-group">
                    <input type="text" placeholder="Name" class="my-input"/>
                    <input type="text" placeholder="Last name" class="my-input"/>
                </div>
                <input type="email" placeholder="Email" class="my-input"/>
                <input type="password" name="password" placeholder="Enter your password" class="my-input">
                <div class="my-checkbox-group">
                    <input class="my-checkbox" type="checkbox">
                    <p>I agree to the <a href="#">Terms & Conditions</a></p>
                </div>
                <button>Create account</button>
            </form>
            <div class="hr-group">
                <hr>
                <span class="my-span">Or register with</span>
                <hr>
            </div>
            <div class="my-button-group">
                <button type="submit" class="my-button">
                    <img src="./images/google-logo.png" alt="google logo" class="my-image">Google
                </button>
                <button type="button" class="my-button">
                    <img src="./images/github-logo.png" alt="github logo" class="my-image">Github
                </button>
            </div>
        </section>
    </body>
</html>
