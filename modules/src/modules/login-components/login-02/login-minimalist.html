<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./login-minimalist.css">
        <title>Login Minimalist</title>
    </head>
    <body>
        <form class="my-form">
            <div class="text-group">
                <h3>Welcome back</h3>
                <p>Sign in to your account</p>
            </div>
            <div class="input-group">
                <label class="my-label">Email:</label>
                <input type="email" placeholder="Your email..." class="my-input"/>
            </div>
            <div class="input-group">
                <label class="my-label">Password:</label>
                <input type="paword" placeholder="Your password..." class="my-input"/>
            </div>
            <div class="data-group">
                <div class="my-checkbox-group">
                    <input class="my-checkbox" type="checkbox" name="checkbox">
                    <span class="my-span">Remember me</span>
                </div>
                <a href="#">Forgot password?</a>
            </div>
            <div class="button-group">
                <button type="submit" class="my-button">Sign In</button>
                <button type="button" class="my-button">Cancel</button>
            </div>
        </form>
    </body>
</html>
