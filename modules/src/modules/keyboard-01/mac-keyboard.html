<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./mac-keyboard.css">
        <title>Mac Keyboard</title>
    </head>
    <body>
        <audio id="audio" src="./assets/audio/koiroylers-keyboard-press.mp3" controls class="audio"></audio>
        <div role="keyboard" class="keyboard">
            <div class="buttons-row row-1">
                <div class="button key-sound">esc</div>
                <div class="button key-sound">
                    <img src="./assets/icons/brightness-down.webp" alt="">
                    <div>F1</div>
                </div>
                <div class="button key-sound">
                    <img src="./assets/icons/brightness-up.webp" alt="">
                    <div>F2</div>
                </div>
                <div class="button key-sound">
                    <img src="./assets/icons/table-dashed.webp" alt="">
                    <div>F3</div>
                </div>
                <div class="button key-sound">
                    <img src="./assets/icons/search.webp" alt="">
                    <div>F4</div>
                </div>
                <div class="button key-sound">
                    <img src="./assets/icons/microphone.webp" alt="">
                    <div>F5</div>
                </div>
                <div class="button key-sound">
                    <img src="./assets/icons/moon.webp" alt="">
                    <div>F6</div>
                </div>
                <div class="button key-sound">
                    <img src="./assets/icons/player-track-prev.webp" alt="">
                    <div>F7</div>
                </div>
                <div class="button key-sound">
                    <img src="./assets/icons/player-skip-forward.webp" alt="">
                    <div>F8</div>
                </div>
                <div class="button key-sound">
                    <img src="./assets/icons/player-track-next.webp" alt="">
                    <div>F9</div>
                </div>
                <div class="button key-sound">
                    <img src="./assets/icons/volume-3.webp" alt="">
                    <div>F10</div>
                </div>
                <div class="button key-sound">
                    <img src="./assets/icons/volume-2.webp" alt="">
                    <div>F11</div>
                </div>
                <div id="key-sound" class="button key-sound">
                    <img src="./assets/icons/volume.webp" alt="">
                    <div>F12</div>
                </div>
                <div class="button key-sound"></div>
            </div>
            <div class="buttons-row row-2">
                <div class="button key-sound">
                    <div>~</div>
                    <div>`</div>
                </div>
                <div class="button key-sound">
                    <div>!</div>
                    <div>1</div>
                </div>
                <div class="button key-sound">
                    <div>@</div>
                    <div>2</div>
                </div>
                <div class="button key-sound">
                    <div>#</div>
                    <div>3</div>
                </div>
                <div class="button key-sound">
                    <div>$</div>
                    <div>4</div>
                </div>
                <div class="button key-sound">
                    <div>%</div>
                    <div>5</div>
                </div>
                <div class="button key-sound">
                    <div>^</div>
                    <div>6</div>
                </div>
                <div class="button key-sound">
                    <div>&</div>
                    <div>7</div>
                </div>
                <div class="button key-sound">
                    <div>*</div>
                    <div>8</div>
                </div>
                <div class="button key-sound">
                    <div>(</div>
                    <div>9</div>
                </div>
                <div class="button key-sound">
                    <div>)</div>
                    <div>0</div>
                </div>
                <div class="button key-sound">
                    <div>─</div>
                    <div>-</div>
                </div>
                <div class="button key-sound">
                    <div>+</div>
                    <div>=</div>
                </div>
                <div class="button key-sound">
                    delete
                </div>
            </div>
            <div class="buttons-row row-3">
                <div class="button key-sound">tab</div>
                <div class="button key-sound">Q</div>
                <div class="button key-sound">W</div>
                <div class="button key-sound">E</div>
                <div class="button key-sound">R</div>
                <div class="button key-sound">T</div>
                <div class="button key-sound">Y</div>
                <div class="button key-sound">U</div>
                <div class="button key-sound">I</div>
                <div class="button key-sound">O</div>
                <div class="button key-sound">P</div>
                <div class="button key-sound">
                    <div>{</div>
                    <div>[</div>
                </div>
                <div class="button key-sound">
                    <div>}</div>
                    <div>]</div>
                </div>
                <div class="button key-sound">
                    <div>|</div>
                    <div>\</div>
                </div>
            </div>
            <div class="buttons-row row-4">
                <div class="button key-sound">caps lock</div>
                <div class="button key-sound">A</div>
                <div class="button key-sound">S</div>
                <div class="button key-sound">D</div>
                <div class="button key-sound">F</div>
                <div class="button key-sound">G</div>
                <div class="button key-sound">H</div>
                <div class="button key-sound">J</div>
                <div class="button key-sound">K</div>
                <div class="button key-sound">L</div>
                <div class="button key-sound">
                    <div>:</div>
                    <div>;</div>
                </div>
                <div class="button key-sound">
                    <div>"</div>
                    <div>'</div>
                </div>
                <div class="button key-sound">return</div>
            </div>
            <div class="buttons-row row-5">
                <div class="button key-sound">shift</div>
                <div class="button key-sound">Z</div>
                <div class="button key-sound">X</div>
                <div class="button key-sound">C</div>
                <div class="button key-sound">V</div>
                <div class="button key-sound">B</div>
                <div class="button key-sound">N</div>
                <div class="button key-sound">M</div>
                <div class="button key-sound">
                    <div><</div>
                    <div>,</div>
                </div>
                <div class="button key-sound">
                    <div>></div>
                    <div>.</div>
                </div>
                <div class="button key-sound">
                    <div>?</div>
                    <div>/</div>
                </div>
                <div class="button key-sound">shift</div>
            </div>
            <div class="buttons-row row-6">
                <div class="button key-sound">
                    <div>fn</div>
                    <img src="./assets/icons/world.webp" alt="">
                </div>
                <div class="button key-sound">
                    <div>^</div>
                    <div>control</div>
                </div>
                <div class="button key-sound">
                    <img src="./assets/icons/option.webp" alt="">
                    <div>option</div>
                </div>
                <div class="button key-sound">
                    <img src="./assets/icons/command.webp" alt="">
                    <div>control</div>
                </div>
                <div class="button key-sound"></div>
                <div class="button key-sound">
                    <img src="./assets/icons/command.webp" alt="">
                    <div>control</div>
                </div>
                <div class="button key-sound">
                    <img src="./assets/icons/option.webp" alt="">
                    <div>option</div>
                </div>
                <div class="button key-sound">
                    <img src="./assets/icons/chevron-compact-left.webp" alt="">
                </div>
                <div>
                    <div class="button key-sound">
                        <img src="./assets/icons/chevron-compact-up.webp" alt="">
                    </div>
                    <div class="button key-sound">
                        <img src="./assets/icons/chevron-compact-down.webp" alt="">
                    </div>
                </div>
                <div class="button key-sound">
                    <img src="./assets/icons/chevron-compact-right.webp" alt="">
                </div>
            </div>
        </div>
        <script src="emit-sounds.js"></script>
    </body>
</html>
