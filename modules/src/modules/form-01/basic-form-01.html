<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./basic-form-01.css">
    <title>Basic-Form</title>
</head>
<body>
    <form class="my-form">
        <div class="input-group">
            <label class="my-label">Name:</label>
            <input type="text" placeholder="Your Name..." class="my-input"/>
        </div>

        <div class="input-group">
            <label class="my-label">Email:</label>
            <input type="email" placeholder="@gmail.com..." class="my-input"/>
        </div>

        <div class="input-group">
            <label class="my-label">Message:</label>
            <textarea name="message" placeholder="Send us a message..." class="my-input"></textarea>
        </div>

        <div class="button-group">
            <button type="submit" class="my-button">Send Message</button>
            <button type="button" class="my-button">Cancel</button>
        </div>
    </form>
</body>
</html>
